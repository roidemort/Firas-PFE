<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Attestation de Participation</title>
    <style>
        @page { 
            size: A4 landscape; 
            margin: 0; 
        }
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif; 
        }
        
        .certificate-container {
            width: 100%;
            height: 100%;
            padding: 15mm;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .certificate { 
            position: relative;
            width: 100%;
            height: 100%;
            background: #ffffff; 
            overflow: hidden; 
            border: 3px solid #1aa3a3;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .left-panel { 
            position: absolute; 
            top: 0; 
            left: 0;
            bottom: 0;
            width: 70mm; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: linear-gradient(165deg, #1aa3a3 0%, #148f8f 45%, #0d7a7a 100%); 
        }
        
        .left-panel::before { 
            content: ''; 
            position: absolute; 
            inset: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.2), transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(255,255,255,0.12), transparent 55%); 
        }
        
        .decorative-circles { 
            position: absolute; 
            inset: 0;
            z-index: 1; 
        }
        
        .decorative-circles::before { 
            content: ''; 
            position: absolute; 
            width: 180px; 
            height: 180px; 
            border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.15); 
            top: -60px; 
            left: -60px; 
        }
        
        .decorative-circles::after { 
            content: ''; 
            position: absolute; 
            width: 140px; 
            height: 140px; 
            border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.1); 
            bottom: -40px; 
            right: -40px; 
        }
        
        .vertical-text { 
            position: relative; 
            transform: rotate(-90deg); 
            font-size: 22pt; 
            color: #ffffff; 
            font-weight: 800; 
            text-align: center; 
            z-index: 2; 
            text-transform: uppercase; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.15); 
            white-space: nowrap; 
        }
        
        .right-panel { 
            position: absolute; 
            top: 0; 
            left: 70mm; 
            right: 0; 
            bottom: 0; 
            padding: 40mm 55mm 30mm 55mm; 
            background: #ffffff; 
        }
        
        .header-accent { 
            width: 60px; 
            height: 4px; 
            background: linear-gradient(90deg, #1aa3a3, #148f8f); 
            margin-bottom: 8mm; 
            border-radius: 2px; 
        }
        
        .title { 
            font-size: 16pt; 
            font-weight: 400; 
            color: #555; 
            margin-bottom: 18mm; 
            letter-spacing: 0.5px; 
            text-transform: uppercase; 
        }
        
        .section { 
            margin-bottom: 16mm; 
        }
        
        .label { 
            font-size: 11pt; 
            color: #1aa3a3; 
            margin-bottom: 4mm; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        .value { 
            font-size: 24pt; 
            font-weight: 700; 
            color: #222; 
            line-height: 1.2; 
        }
        
        .value.course { 
            font-size: 20pt; 
            font-weight: 600; 
            color: #1aa3a3; 
        }
        
        .underline { 
            width: 100%; 
            border-bottom: 2px solid #e8f5f5; 
            margin-top: 6mm; 
        }
        
        .footer { 
            position: absolute; 
            bottom: 25mm; 
            left: 55mm; 
            right: 55mm; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            padding-top: 12mm; 
            border-top: 1px solid #e8f5f5; 
        }
        
        .date-block .label { 
            font-size: 9pt; 
            margin-bottom: 2mm; 
        }
        
        .date-block .value { 
            font-size: 13pt; 
            font-weight: 600; 
        }
        
        .logo img { 
            height: 65px; 
            opacity: 0.95; 
        }
        
        .seal { 
            position: absolute; 
            bottom: 80mm; 
            right: 45mm; 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            border: 3px solid #1aa3a3; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle, #f0fafa, #ffffff); 
            opacity: 0.6; 
        }
        
        .seal::before { 
            content: '✓'; 
            font-size: 48px; 
            color: #1aa3a3; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="certificate-container">
        <div class="certificate">
            <div class="left-panel">
                <div class="decorative-circles"></div>
                <div class="vertical-text">Attestation de Participation</div>
            </div>
            <div class="right-panel">
                <div class="header-accent"></div>
                <div class="title">Galiocare certifie que</div>
                <div class="section">
                    <div class="label">Pharmacien(ne)</div>
                    <div class="value">Semer Belghith</div>
                    <div class="underline"></div>
                </div>
                <div class="section">
                    <div class="label">A complété avec succès la formation</div>
                    <div class="value course">Digital Health & Pharmacy Innovation</div>
                    <div class="underline"></div>
                </div>
                <div class="seal"></div>
                <div class="footer">
                    <div class="date-block">
                        <div class="label">Délivré le</div>
                        <div class="value">09 Février 2026</div>
                    </div>
                    <div class="logo">
                        <img src="https://galiocare.com/assets/images/logo.png" alt="Galiocare Logo">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
