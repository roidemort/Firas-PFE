<app-loader *ngIf="isLoading"></app-loader>
<div class="mx-auto px-4 py-4 sm:px-8" #actions>
  <div class="mb-4 flex justify-between">
    <div class="inline-block">
      <h3 class="font-semibold text-foreground">Liste des certificats</h3>
      <div class="space-x-1 text-xs font-medium text-muted-foreground">
        <a href="" class="hover:text-primary">Tous les certificats:</a>
        <span class="text-foreground">{{ allCertificatesCount }}</span>
      </div>
    </div>
    <div class="inline-block space-x-4">
      <button  (click)="manageCertificate('add')"
               class="flex items-center justify-center bg-primary text-white p-2 rounded-md border-b-[3px] border-primary-dark" type="button">
        <svg-icon src="assets/icons/heroicons/outline/plus.svg" [svgClass]="'h-5 w-5'"> </svg-icon>
        Ajouter un certificat</button>
    </div>
  </div>
  <div class="flex min-w-full flex-col rounded-xl border border-muted/20 bg-background p-2">
    <app-loader *ngIf="isLoading"></app-loader>
    <app-table-course-action class="mb-10" (changeStatus)="onChangeStatus($event)" (changeText)="onChangeText($event)" [selectedPrice]="false" [selectedCS]="false"></app-table-course-action>
    <div class="flex min-w-full flex-wrap">
      @for (certificate of certificates; track certificate) {
        <div class="p-4 md:w-1/3" >
          <div class="h-full border-2 border-gray-200 border-opacity-60 rounded-lg overflow-hidden">
            <img class="lg:h-48 md:h-36 w-full object-cover object-center" src="{{ certificate.background?.secure_url }}" alt="blog cover"/>
            <div class="p-4">
              <h1 class="title-font text-lg font-medium text-gray-900">{{ certificate.name }}</h1>
              <div class="flex items-center flex-wrap justify-between">
                <div class=" flex flex-row items-center">
                  <label for="status-{{certificate.id}}" class="space-x-2 flex font-semibold text-base text-gray-600 dark:text-night-100 relative" >Statut
                    <input type="checkbox" class="sr-only peer" (click)="changeStatus($event, certificate.id, certificate.status)" [checked]="certificate.status == 1">
                    <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-[#21c65f]"></div>
                  </label>
                </div>
                <div class=" flex flex-row items-center">
                  <button
                    (click)="manageCertificate('edit', certificate.id)"
                    matTooltip="Modifier"
                    class="flex h-7 w-7 items-center text-red-600 justify-center rounded-md hover:bg-card hover:text-red-800">
                    <svg-icon src="./assets/icons/heroicons/outline/pencil-square.svg" [svgClass]="'h-4 w-4'"> </svg-icon>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      }
      @if (!certificates || !certificates.length) {
        <h2 class="font-semibold text-foreground">Aucune certificat trouvé</h2>
      }
    </div>
    <app-table-course-footer class="mt-10" (changeItemsPerPage)="onChangeItemsPerPage($event)"
                             [currentPage]="currentPage"
                             [itemsPerPage]="itemsPerPage"
                             [totalItems]="allCertificatesCount"
                             (pageChanged)="onPageChange($event)"></app-table-course-footer>
  </div>
</div>
