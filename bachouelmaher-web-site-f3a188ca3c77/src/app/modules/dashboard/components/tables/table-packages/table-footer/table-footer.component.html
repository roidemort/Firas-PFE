<div class="flex flex-wrap items-center justify-between gap-2 py-3 px-5 text-xs text-muted-foreground">
  <div class="order-2 flex items-center gap-2 md:order-1">
    Affichage
    <select class="w-16 p-2" (change)="onChangeItemsPerPage($event)">
      <option value="5">5</option>
      <option value="10" selected>10</option>
      <option value="20">20</option>
      <option value="30">30</option>
      <option value="50">50</option>
    </select>
    par page
  </div>
  <div class="order-1 flex items-center gap-4 md:order-2">
    <div class="inline-flex items-center gap-1">
      <button (click)="changePage(1)" [disabled]="currentPage === 1"
              class="inline-flex h-7 w-7 flex-shrink-0 items-center justify-center rounded-md text-sm disabled:opacity-50"
              disabled>
        <svg-icon src="./assets/icons/heroicons/outline/chevron-double-left.svg" [svgClass]="'h-4 w-4'"> </svg-icon>
      </button>
      <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1"
        class="inline-flex h-7 w-7 flex-shrink-0 items-center justify-center rounded-md text-sm disabled:opacity-50"
        disabled>
        <svg-icon src="./assets/icons/heroicons/outline/chevron-left.svg" [svgClass]="'h-4 w-4'"> </svg-icon>
      </button>
      <span>Page {{ currentPage }} de {{ totalPages }}</span>
      <button (click)="changePage(currentPage + 1)" [disabled]="currentPage == totalPages"
              class="inline-flex h-7 w-7 flex-shrink-0 items-center justify-center rounded-md text-sm disabled:opacity-50"
              disabled>
        <svg-icon src="./assets/icons/heroicons/outline/chevron-right.svg" [svgClass]="'h-4 w-4'"> </svg-icon>
      </button>
      <button (click)="changePage(totalPages)" [disabled]="currentPage == totalPages"
              class="inline-flex h-7 w-7 flex-shrink-0 items-center justify-center rounded-md text-sm disabled:opacity-50"
              disabled>
        <svg-icon src="./assets/icons/heroicons/outline/chevron-double-right.svg" [svgClass]="'h-4 w-4'"> </svg-icon>
      </button>
    </div>
  </div>
</div>
