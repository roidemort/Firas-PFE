<div class="w-full sm:px-2 py-4 bg-lightblue-100">
    <div class="flex flex-col lg:flex-row gap-4 xl:gap-x-10">
        <!-- Card 1 -->
        <div class="w-full flex flex-col sm:flex-row items-stretch gap-4 xl:gap-x-10">
            <div *ngFor="let trainer of trainers"
                class="w-full lg:w-1/3 relative bg-[#EDF6F6] rounded-[21px] shadow-md overflow-hidden group">
                  <div class="h-80 bg-[#C4C4C4] rounded-t-lg"
                    [ngStyle]="{
                      'background-image': 'url(' + trainer?.image.secure_url + ')',
                      'background-size': 'cover',
                      'background-position': 'center',
                      'background-repeat': 'no-repeat'
                    }">
                </div>                <div class="p-4">
                    <h2 class="text-lg font-semibold">{{ trainer?.name }}</h2>
                    <p class="text-sm text-gray-600">{{ trainer?.job }}</p>
                    <div class="flex space-x-2 mt-4">
                        <a *ngIf="trainer?.twitter.length > 1" [href]="trainer?.twitter" target="_blank" class="text-blue-500">
                            <img src="assets/images/twitter.svg" alt="twitter">
                        </a>
                        <a [href]="'mailto:' + trainer?.email" class="text-blue-500">
                            <img src="assets/images/email.svg" alt="email">
                        </a>
                    </div>
                </div>

                <div
                    class="custom-bg-card absolute inset-0 p-6 opacity-0 transition-opacity duration-300 ease-in-out group-hover:opacity-100" [ngStyle]="{'background-image': 'url(' + trainer?.image.secure_url + ')'}">
                    <div class="content">
                        <h2 class="text-xl text-[#EDF6F6] font-medium leading-10">{{ trainer?.name }}</h2>
                        <p class="mt-2 text-xs font-semibold text-[#B0EDF1]">{{ trainer?.job }}</p>
                        <p class="mt-3 text-xs leading-5 text-[#DCECEC] font-semibold">{{ trainer?.description }}</p>
                        <div class="flex space-x-2 mt-4">
                            <a *ngIf="trainer?.twitter.length > 1" [href]="trainer?.twitter" target="_blank" class="text-blue-300">
                                <img src="assets/images/twitter1.svg" alt="twitter-1">
                            </a>
                            <a [href]="'mailto:' + trainer?.email" class="text-blue-300">
                                <img src="assets/images/email1.svg" alt="email-1">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
