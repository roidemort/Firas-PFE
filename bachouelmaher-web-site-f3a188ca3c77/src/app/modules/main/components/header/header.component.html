<header>
    <section>
        <div class="bg-[#0D1B2A] fixed top-0 left-0 w-full px-4 pt-2 pb-0 lg:px-12 flex items-center justify-between z-50">
            <!-- Logo -->
            <div>
                <a [routerLink]="'/'">
                    <img class="h-16 md:h-20 w-auto" src="assets/images/logo.png" alt="FORMAVANTIS">
                </a>
            </div>

            <!-- Menu -->
            <div
                [ngClass]="{ 'hidden': !isMenuOpen, 'flex': isMenuOpen }"
                class="absolute top-[4.5rem] left-0 w-full md:w-auto md:static bg-[#0D1B2A] md:bg-transparent flex-col md:flex-row md:flex md:items-center space-y-4 md:space-y-0 md:space-x-6 p-5 md:p-0 transition-all duration-300"
            >
                <ul class="flex flex-col gap-x-8 md:flex-row items-center space-y-4 md:space-y-0 lg:space-x-10 xl:space-x-20 text-[#F8F9FA] font-light text-xl">
                    <li><a (click)="isMenuOpen = false" [routerLink]="'/a-propos'">À propos</a></li>
                    <li><a (click)="isMenuOpen = false" [routerLink]="isLogged ? '/notre-plateforme' : '/connexion'">Nos formations</a></li>
                    <li><a (click)="isMenuOpen = false" [routerLink]="'/contactez-nous'">Contactez-nous</a></li>
                    <li><a (click)="isMenuOpen = false" [routerLink]="'/abonnement'">Tarifs</a></li>
                </ul>

                <!-- Bouton Commencez Mobile -->
                <div class="md:hidden w-full flex justify-center">
                    <a [routerLink]="isLogged ? '/notre-plateforme' : '/connexion'">
                        <button type="button"
                            class="w-full border-2 hover:bg-transparent hover:text-white border-secondaryfontColor bg-secondaryfontColor rounded-full text-sm px-5 py-3 text-[#0D1B2A] transition duration-300">
                            Commencez
                        </button>
                    </a>
                </div>
            </div>

            <!-- Bouton Menu Mobile -->
            <div class="md:hidden">
                <button (click)="toggleMenu()" class="text-[#D1FA94] focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="#D1FA94">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>

            <!-- Bouton Commencez Desktop -->
            <div class="hidden md:flex">
                <a [routerLink]="isLogged ? '/notre-plateforme' : '/connexion'">
                    <button type="button"
                        class="border-2 hover:bg-transparent hover:text-white border-secondaryfontColor bg-secondaryfontColor rounded-full text-sm px-6 lg:px-14 py-3 text-[#0D1B2A] transition duration-300">
                        Commencez
                    </button>
                </a>
            </div>
        </div>
    </section>
</header>
