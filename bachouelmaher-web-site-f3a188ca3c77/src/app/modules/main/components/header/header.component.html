<header class="sticky top-0 z-50">
    <!-- Top Bar (optional for announcements) -->
    <div class="bg-[#0D1B2A] hidden md:block py-2 px-4">
        <div class="max-w-7xl mx-auto text-center">
            <p class="text-secondaryfontColor text-sm">🚀 Formation continue exclusive pour pharmaciens et préparateurs</p>
        </div>
    </div>

    <!-- Main Navigation -->
    <nav class="bg-[#0D1B2A]/95 backdrop-blur-sm border-b border-[#1b9198]/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <!-- Logo -->
                <div class="flex items-center">
                    <a [routerLink]="'/'">
                        <div class="flex items-center space-x-3">
                            <img class="h-18 md:h-20 w-auto" src="assets/images/logo.png" alt="GALIOCARE">
                        </div>
                    </a>
                </div>

                <!-- Desktop Navigation -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a [routerLink]="'/'"
                           class="text-gray-300 hover:text-secondaryfontColor hover:scale-105 transition-all duration-300 px-3 py-2 text-sm font-medium relative group">
                            Àcceuil
                            <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-secondaryfontColor group-hover:w-full transition-all duration-300"></span>
                        </a>

                        <a [routerLink]="'/a-propos'"
                           class="text-gray-300 hover:text-secondaryfontColor hover:scale-105 transition-all duration-300 px-3 py-2 text-sm font-medium relative group">
                            À propos
                            <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-secondaryfontColor group-hover:w-full transition-all duration-300"></span>
                        </a>
                        <a [routerLink]="isLogged ? '/notre-plateforme' : '/connexion'"
                           class="text-gray-300 hover:text-secondaryfontColor hover:scale-105 transition-all duration-300 px-3 py-2 text-sm font-medium relative group">
                            Nos formations
                            <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-secondaryfontColor group-hover:w-full transition-all duration-300"></span>
                        </a>

                        <a [routerLink]="'/contactez-nous'"
                           class="text-gray-300 hover:text-secondaryfontColor hover:scale-105 transition-all duration-300 px-3 py-2 text-sm font-medium relative group">
                            Contactez-nous
                            <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-secondaryfontColor group-hover:w-full transition-all duration-300"></span>
                        </a>

                        <a [routerLink]="'/abonnement'"
                           class="text-gray-300 hover:text-secondaryfontColor hover:scale-105 transition-all duration-300 px-3 py-2 text-sm font-medium relative group">
                            Tarifs
                            <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-secondaryfontColor group-hover:w-full transition-all duration-300"></span>
                        </a>
                    </div>
                </div>

                <!-- CTA Button Desktop -->
                <div class="hidden md:flex items-center space-x-6">
                    <div class="relative">
                        <div class="absolute -inset-0.5 bg-gradient-to-r from-secondaryfontColor to-[#88BFBF] rounded-full blur opacity-75 group-hover:opacity-100 transition duration-1000 group-hover:duration-200"></div>
                        <a [routerLink]="isLogged ? '/notre-plateforme' : '/connexion'">
                            <button class="relative px-8 py-3 bg-[#0D1B2A] rounded-full leading-none flex items-center space-x-2">
                                <span class="text-secondaryfontColor font-semibold text-sm">Commencez</span>
                                <svg class="w-4 h-4 text-secondaryfontColor" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                                </svg>
                            </button>
                        </a>
                    </div>
                </div>

                <!-- Mobile menu button -->
                <div class="md:hidden">
                    <button (click)="toggleMenu()"
                            class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-secondaryfontColor transition-all duration-300">
                        <svg class="h-6 w-6" :class="{'hidden': isMenuOpen, 'block': !isMenuOpen}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                        <svg class="h-6 w-6" :class="{'hidden': !isMenuOpen, 'block': isMenuOpen}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile menu -->
        <div class="md:hidden" [ngClass]="{'hidden': !isMenuOpen, 'block': isMenuOpen}">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-[#0D1B2A]/95 backdrop-blur-sm border-t border-[#1b9198]/20">
                <a [routerLink]="'/a-propos'"
                   (click)="isMenuOpen = false"
                   class="block px-3 py-4 text-base font-medium text-gray-300 hover:text-secondaryfontColor hover:bg-gray-700/50 rounded-lg transition-all duration-300">
                    À propos
                </a>

                <a [routerLink]="isLogged ? '/notre-plateforme' : '/connexion'"
                   (click)="isMenuOpen = false"
                   class="block px-3 py-4 text-base font-medium text-gray-300 hover:text-secondaryfontColor hover:bg-gray-700/50 rounded-lg transition-all duration-300">
                    Nos formations
                </a>

                <a [routerLink]="'/contactez-nous'"
                   (click)="isMenuOpen = false"
                   class="block px-3 py-4 text-base font-medium text-gray-300 hover:text-secondaryfontColor hover:bg-gray-700/50 rounded-lg transition-all duration-300">
                    Contactez-nous
                </a>

                <a [routerLink]="'/abonnement'"
                   (click)="isMenuOpen = false"
                   class="block px-3 py-4 text-base font-medium text-gray-300 hover:text-secondaryfontColor hover:bg-gray-700/50 rounded-lg transition-all duration-300">
                    Tarifs
                </a>

                <!-- Mobile CTA Button -->
                <div class="px-3 py-4">
                    <a [routerLink]="isLogged ? '/notre-plateforme' : '/connexion'" (click)="isMenuOpen = false">
                        <button class="w-full bg-gradient-to-r from-secondaryfontColor to-[#88BFBF] text-[#0D1B2A] font-semibold py-3 px-6 rounded-full hover:opacity-90 transition-all duration-300 flex items-center justify-center space-x-2">
                            <span>Commencez maintenant</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                            </svg>
                        </button>
                    </a>
                </div>
            </div>
        </div>
    </nav>
</header>
