<!-- Nav Principal -->
<nav [ngClass]="menu ? 'w-60 lg:w-[300px]' : 'w-0'"
  class="overflow-auto min-h-[90vh] hidden h-full flex-col justify-between bg-[#0b1b29] pt-3 transition-all duration-300 lg:flex">
  <ng-container *ngTemplateOutlet="navContent"></ng-container>
</nav>

<!-- Nav Mobile -->
<nav *ngIf="mobileMenu"
  class="custom-background overflow-auto absolute max-h-[32rem] justify-start bg-[#0b1b29] top-[60px] xs:top-[66px] left-0 w-full h-screen p-6 pl-8 xs:pr-5 lg:px-12 xs:py-5 flex lg:!hidden items-start z-10">
  <ng-container *ngTemplateOutlet="navContent"></ng-container>
</nav>

<ng-template #navContent>
  <div *ngIf="showContent" class="w-full sm:pt-4 sm:pr-4 sm:pl-8 sm:pb-8 space-y-6 max-h-[32rem]">

    <!-- Accueil -->
    <div class="flex gap-x-2 items-center cursor-pointer" (click)="resetFilters()">
      <svg-icon src="assets/images/Home.svg" [svgClass]="'h-5 w-5'"></svg-icon>
      <h1 class="font-medium text-base text-titleColor">Accueil</h1>
    </div>

    <!-- Nos formations -->
    <div class="space-y-4">
      <div class="flex gap-x-2 items-center">
        <svg-icon src="assets/images/Video_file.svg" [svgClass]="'h-5 w-5'"></svg-icon>
        <h1 class="font-medium text-base text-titleColor">Nos formations</h1>
      </div>
      <hr class="border-titleColor">

      <!-- Simple Category Dropdown -->
      <div class="space-y-2">
        <label class="text-sm text-[#476F77] font-medium">Catégorie</label>
        <select
          [(ngModel)]="selectedCategoryId"
          (change)="onCategoryChange()"
          class="w-full bg-[#1a2c3a] border border-[#476F77] rounded-lg py-3 px-3 text-sm text-white focus:outline-none focus:border-[#88BFBF] transition cursor-pointer">
          <option value="" class="bg-[#0b1b29] text-gray-400">Toutes les catégories</option>
          <option *ngFor="let category of categories" [value]="category.id" class="bg-[#0b1b29] text-white">
            {{ category.name }}
          </option>
        </select>
      </div>

      <!-- Simple Provider Dropdown (only shows when category is selected) -->
      <div *ngIf="selectedCategoryId" class="space-y-2">
        <label class="text-sm text-[#476F77] font-medium">Fournisseur</label>
        <select
          [(ngModel)]="selectedProviderId"
          (change)="onProviderChange()"
          class="w-full bg-[#1a2c3a] border border-[#476F77] rounded-lg py-3 px-3 text-sm text-white focus:outline-none focus:border-[#88BFBF] transition cursor-pointer">
          <option value="" class="bg-[#0b1b29] text-gray-400">Tous les fournisseurs</option>
          <option *ngFor="let provider of getProvidersForSelectedCategory()" [value]="provider.id" class="bg-[#0b1b29] text-white">
            {{ provider.name }}
          </option>
        </select>
      </div>

      <!-- Active Filters -->
      <div *ngIf="selectedCategoryId || selectedProviderId" class="pt-2">
        <div class="flex flex-wrap gap-2">
          <div *ngIf="selectedCategoryName" class="bg-[#2a4a5a] text-white text-xs px-3 py-1 rounded-full flex items-center gap-2">
            <span>{{ selectedCategoryName }}</span>
            <button (click)="clearCategoryFilter()" class="hover:text-red-300">✕</button>
          </div>
          <div *ngIf="selectedProviderName" class="bg-[#2a4a5a] text-white text-xs px-3 py-1 rounded-full flex items-center gap-2">
            <span>{{ selectedProviderName }}</span>
            <button (click)="clearProviderFilter()" class="hover:text-red-300">✕</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Capsules -->
    <div class="space-y-4">
      <div class="flex gap-x-2 items-center">
        <svg-icon src="assets/images/pil.svg" [svgClass]="'h-5 w-5'"></svg-icon>
        <h1 class="font-medium text-base text-titleColor">Capsules</h1>
      </div>
      <hr class="border-titleColor">

      <!-- Simple Capsule Category Dropdown -->
      <div class="space-y-2">
        <label class="text-sm text-[#476F77] font-medium">Catégorie de capsule</label>
        <select
          [(ngModel)]="selectedCapsuleId"
          (change)="onCapsuleChange()"
          class="w-full bg-[#1a2c3a] border border-[#476F77] rounded-lg py-3 px-3 text-sm text-white focus:outline-none focus:border-[#88BFBF] transition cursor-pointer">
          <option value="" class="bg-[#0b1b29] text-gray-400">Toutes les capsules</option>
          <option *ngFor="let capsule of capsules" [value]="capsule.id" class="bg-[#0b1b29] text-white">
            {{ capsule.name }}
          </option>
        </select>
      </div>

      <!-- Simple Capsule Provider Dropdown -->
      <div *ngIf="selectedCapsuleId" class="space-y-2">
        <label class="text-sm text-[#476F77] font-medium">Fournisseur de capsule</label>
        <select
          [(ngModel)]="selectedCapsuleProviderId"
          (change)="onCapsuleProviderChange()"
          class="w-full bg-[#1a2c3a] border border-[#476F77] rounded-lg py-3 px-3 text-sm text-white focus:outline-none focus:border-[#88BFBF] transition cursor-pointer">
          <option value="" class="bg-[#0b1b29] text-gray-400">Tous les fournisseurs</option>
          <option *ngFor="let provider of getProvidersForSelectedCapsule()" [value]="provider.id" class="bg-[#0b1b29] text-white">
            {{ provider.name }}
          </option>
        </select>
      </div>
    </div>

    <!-- Vidéos à venir -->
    <div class="flex gap-x-2 items-center !mb-4 cursor-not-allowed pb-8">
      <svg-icon src="assets/images/Date_today.svg" [svgClass]="'h-5 w-5'"></svg-icon>
      <h1 class="font-medium text-base text-titleColor opacity-50">Vidéos à venir</h1>
    </div>

  </div>
</ng-template>
