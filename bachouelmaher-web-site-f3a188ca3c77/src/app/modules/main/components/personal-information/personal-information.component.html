<section class="relative h-full">
    <div class="w-full absolute bottom-0 z-10 -mt-9 transition-transform duration-300 ease-in-out"
        *ngIf="handleResponse || handleErrorResponse || handleError" [ngClass]="{
            'translate-y-0 opacity-100': handleResponse || handleErrorResponse || handleError,
            '-translate-y-10 opacity-0': !(handleResponse || handleErrorResponse || handleError)
        }">
        <div class="flex items-center p-4 mb-6 rounded-2xl shadow-lg border transition-all duration-300" [ngClass]="{
                'bg-red-100 border-red-400 text-red-700': handleError,
                'bg-yellow-100 border-yellow-400 text-yellow-700': handleErrorResponse,
                'bg-green-100 border-green-400 text-green-700': handleResponse
            }">
            <svg (click)="closeAlert()" class="cursor-pointer w-6 h-6 mr-2" [ngClass]="{
                'text-red-500': handleError,
                'text-yellow-500': handleErrorResponse,
                'text-green-500': handleResponse
            }" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M18.364 5.636l-12.728 12.728M5.636 5.636l12.728 12.728">
                </path>
            </svg>
            <p class="font-semibold text-sm">{{ getAlertMessage() }}</p>
        </div>
    </div>

    <div
        class="w-full flex flex-col items-center space-y-4 sm:space-y-0 sm:flex-row sm:justify-between pb-8 border-b border-[#88BFBF]">
        <div class="flex flex-col gap-y-6 xs:flex-row justify-center items-center gap-x-7">
            <div class="relative mx-auto ">
                <!-- <img *ngIf="!currentUser?.img_link"
                     class="rounded-full relative w-[110px] h-[110px] object-contain ml-5 border-2 border-fontColor"
                    [src]="'https://i.pravatar.cc/100?img=' + random" alt="avatar" /> -->
                <img *ngIf="!currentUser?.img_link" class="rounded-full relative w-[110px] h-[110px] object-contain ml-5 border-2 border-secondaryfontColor"
                    src="assets/images/default-img.png" alt="img-profile" />
                <img *ngIf="currentUser?.img_link" class="rounded-full relative w-[110px] h-[110px] object-contain ml-5 border-2 border-secondaryfontColor"
                    src="{{imgLink ? imgLink : currentUser?.img_link}}" alt="img-profile" />
                <input accept="image/png, image/jpg, image/jpeg" #fileInput class="hidden" type="file"
                    (change)="onFileSelected($event)" />
                <span
                    class="cursor-pointer rounded-[50%] absolute text-fontColor bg-transparent text-sm -right-4 -bottom-5"
                    (click)="triggerFileInput()">
                    <img width="45" height="45" src="assets/images/cercle-camera.svg">
                </span>
            </div>
            <div class="space-y-1">
                <h1 class="font-semibold text-2xl text-secondaryfontColor capitalize">{{currentUser?.firstName}}
                    {{currentUser?.lastName}}</h1>
                <p class="font-semibold text-sm text-white">
                    {{ getRoleDisplayName(currentUser?.role) }}
                </p>
                <p class="font-semibold text-sm text-white">Date d'adhésion : <span class="underline text-secondaryfontColor">{{
                        currentUser?.createdAt | date}}</span></p>
            </div>
        </div>
        <!-- <div class="flex items-center gap-x-7 pr-10">
            <div>
                <img src="assets/images/Medallions.svg" alt="medallions">
            </div>
            <div>
                <h1 class="font-semibold text-lg text-[#19272A]">Collection de badges</h1>
                <p class="font-semibold text-xs text-[#476F77]">1 certification réalisée</p>
            </div>
        </div> -->
    </div>
    <section *ngIf="showContent">
        <form class="w-full" [formGroup]="firstEditForm" (ngSubmit)="onSubmit('firstForm')">
            <div class="w-full flex items-center justify-between mt-8">
                <div>
                    <h1 class="font-semibold text-2xl text-secondaryfontColor">Informations personnelles</h1>
                </div>
                <div *ngIf="!editMode.firstForm">
                    <button type="button" (click)="toggleEditMode('firstForm')">
                        <img src="assets/images/edit-00.svg" alt="edit">
                    </button>
                </div>
                <div *ngIf="editMode.firstForm" class="flex gap-4">
                    <button type="button" (click)="toggleEditMode('firstForm')">
                        <img src="assets/images/cancel.svg" alt="cancel-1">
                    </button>
                    <button type="submit">
                        <img src="assets/images/save.svg" alt="save-1">
                    </button>
                </div>
            </div>

            <div class="w-full flex flex-col md:space-x-3 space-y-4 md:space-y-0 md:flex-row mt-10">
                <div class="w-full md:w-1/3">
                    <div class="relative w-full">
                        <input type="text" formControlName="fullName" id="fullName" placeholder="" required
                            [ngClass]="{'border border-secondaryfontColor focus:ring-secondaryfontColor focus:border-secondaryfontColor': editMode.firstForm, 'border-transparent': !editMode.firstForm}"
                            class="w-full capitalize font-semibold text-base text-white peer transition duration-200 ease-linear bg-transparent outline-none placeholder:font-medium placeholder:leading-7 placeholder:text-base placeholder:text-white rounded-[14px] pt-5 pb-[10px] p-4" />
                        <label for="fullName"
                            class="text-sm font-semibold text-[#476F77] pt-[15px] pointer-events-none absolute left-0 top-0 origin-[0_0] border border-solid border-transparent p-4 transition-[opacity,_transform] duration-200 ease-linear peer-focus:-translate-y-2 peer-focus:translate-x-[0.15rem] peer-focus:scale-[0.85] peer-[:not(:placeholder-shown)]:-translate-y-2 peer-[:not(:placeholder-shown)]:translate-x-[0.15rem] peer-[:not(:placeholder-shown)]:scale-[0.85]">
                            Nom et prénom
                        </label>
                    </div>
                    <div *ngIf="firstEditForm.get('fullName')!.hasError('required') && firstEditForm.get('fullName')!.touched"
                        class="text-red-500 text-left !mt-1 text-sm ml-1">
                        Le champ est obligatoire.
                    </div>
                </div>

                <div class="w-full md:w-1/3">
                    <div class="relative w-full">
                        <input type="text" AppPhoneNumber formControlName="tel" id="tel" placeholder="" required
                            [ngClass]="{'border border-secondaryfontColor focus:ring-secondaryfontColor focus:border-secondaryfontColor': editMode.firstForm, 'border-transparent': !editMode.firstForm}"
                            class="w-full font-semibold text-base text-white peer transition duration-200 ease-linear bg-transparent outline-none placeholder:font-medium placeholder:leading-7 placeholder:text-base placeholder:text-white rounded-[14px] pt-5 pb-[10px] p-4" />
                        <label for="tel"
                            class="text-sm font-semibold text-[#476F77] pt-[15px] pointer-events-none absolute left-0 top-0 origin-[0_0] border border-solid border-transparent p-4 transition-[opacity,_transform] duration-200 ease-linear peer-focus:-translate-y-2 peer-focus:translate-x-[0.15rem] peer-focus:scale-[0.85] peer-[:not(:placeholder-shown)]:-translate-y-2 peer-[:not(:placeholder-shown)]:translate-x-[0.15rem] peer-[:not(:placeholder-shown)]:scale-[0.85]">
                            Numéro de téléphone
                        </label>
                    </div>
                    <div *ngIf="firstEditForm.get('tel')!.hasError('required') && firstEditForm.get('tel')!.touched"
                        class="text-red-500 text-left !mt-1 text-sm ml-1">
                        Le champ est obligatoire.
                    </div>
                </div>

                <div class="w-full md:w-1/3">
                    <div class="relative w-full">
                        <input type="text" formControlName="email" id="email" placeholder="" required
                            [ngClass]="{'cursor-not-allowed border border-secondaryfontColor focus:ring-secondaryfontColor focus:border-secondaryfontColor': editMode.firstForm, 'border-transparent': !editMode.firstForm}"
                            class="w-full font-semibold text-base text-white peer transition duration-200 ease-linear bg-transparent outline-none placeholder:font-medium placeholder:leading-7 placeholder:text-base placeholder:text-white rounded-[14px] pt-5 pb-[10px] p-4" />
                        <label for="email"
                            class="text-sm font-semibold text-[#476F77] pt-[15px] pointer-events-none absolute left-0 top-0 origin-[0_0] border border-solid border-transparent p-4 transition-[opacity,_transform] duration-200 ease-linear peer-focus:-translate-y-2 peer-focus:translate-x-[0.15rem] peer-focus:scale-[0.85] peer-[:not(:placeholder-shown)]:-translate-y-2 peer-[:not(:placeholder-shown)]:translate-x-[0.15rem] peer-[:not(:placeholder-shown)]:scale-[0.85]">
                            Adresse email
                        </label>
                    </div>
                </div>
            </div>
        </form>
    </section>

    <section *ngIf="showContent">
        <form class="w-full pb-6" [formGroup]="secondEditForm" (ngSubmit)="onSubmit('secondForm')">
            <div class="w-full flex items-center justify-between mt-10">
                <div>
                    <h1 class="font-semibold text-2xl text-secondaryfontColor">Détails de l'adresse</h1>
                </div>
                <div *ngIf="!editMode.secondForm">
                    <button type="button" (click)="toggleEditMode('secondForm')">
                        <img src="assets/images/edit-00.svg" alt="edit">
                    </button>
                </div>
                <div *ngIf="editMode.secondForm" class="flex gap-4">
                    <button type="button" (click)="toggleEditMode('secondForm')">
                        <img src="assets/images/cancel.svg" alt="cancel-1">
                    </button>
                    <button type="submit">
                        <img src="assets/images/save.svg" alt="save-1">
                    </button>
                </div>
            </div>

            <div class="w-full flex flex-col md:space-x-3 space-y-4 md:space-y-0 md:flex-row mt-10">
                <div class="w-full md:w-1/3">
                    <div class="relative w-full">
                        <input type="text" formControlName="address" id="address" placeholder=""
                            [ngClass]="{'border border-secondaryfontColor focus:ring-secondaryfontColor focus:border-secondaryfontColor': editMode.secondForm, 'border-transparent': !editMode.secondForm}"
                            (focus)="clearDash('address')" (blur)="restoreDash('address')"
                            class="w-full capitalize font-semibold text-base text-white peer transition duration-200 ease-linear bg-transparent outline-none placeholder:font-medium placeholder:leading-7 placeholder:text-base placeholder:text-white rounded-[14px] pt-5 pb-[10px] p-4" />
                        <label for="address"
                            class="text-sm font-semibold text-[#476F77] pt-[15px] pointer-events-none absolute left-0 top-0 origin-[0_0] border border-solid border-transparent p-4 transition-[opacity,_transform] duration-200 ease-linear peer-focus:-translate-y-2 peer-focus:translate-x-[0.15rem] peer-focus:scale-[0.85] peer-[:not(:placeholder-shown)]:-translate-y-2 peer-[:not(:placeholder-shown)]:translate-x-[0.15rem] peer-[:not(:placeholder-shown)]:scale-[0.85]">
                            Adresse complète
                        </label>
                    </div>
                </div>

                <div class="w-full md:w-1/3">
                    <div class="relative w-full">
                        <input type="text" formControlName="city" id="city" placeholder=""
                            [ngClass]="{'border border-secondaryfontColor focus:ring-secondaryfontColor focus:border-secondaryfontColor': editMode.secondForm, 'border-transparent': !editMode.secondForm}"
                            (focus)="clearDash('city')" (blur)="restoreDash('city')"
                            class="w-full font-semibold text-base text-white peer transition duration-200 ease-linear bg-transparent outline-none placeholder:font-medium placeholder:leading-7 placeholder:text-base placeholder:text-white rounded-[14px] pt-5 pb-[10px] p-4" />
                        <label for="city"
                            class="text-sm font-semibold text-[#476F77] pt-[15px] pointer-events-none absolute left-0 top-0 origin-[0_0] border border-solid border-transparent p-4 transition-[opacity,_transform] duration-200 ease-linear peer-focus:-translate-y-2 peer-focus:translate-x-[0.15rem] peer-focus:scale-[0.85] peer-[:not(:placeholder-shown)]:-translate-y-2 peer-[:not(:placeholder-shown)]:translate-x-[0.15rem] peer-[:not(:placeholder-shown)]:scale-[0.85]">
                            Ville
                        </label>
                    </div>
                </div>

                <div class="w-full md:w-1/3">
                    <div class="relative w-full">
                        <input type="text" formControlName="zipCode" id="zipCode" placeholder="" appOnlyNumbers
                            [ngClass]="{'border border-secondaryfontColor focus:ring-secondaryfontColor focus:border-secondaryfontColor': editMode.secondForm, 'border-transparent': !editMode.secondForm}"
                            (focus)="clearDash('zipCode')" (blur)="restoreDash('zipCode')"
                            class="w-full font-semibold text-base text-white peer transition duration-200 ease-linear bg-transparent outline-none placeholder:font-medium placeholder:leading-7 placeholder:text-base placeholder:text-white rounded-[14px] pt-5 pb-[10px] p-4" />
                        <label for="zipCode"
                            class="text-sm font-semibold text-[#476F77] pt-[15px] pointer-events-none absolute left-0 top-0 origin-[0_0] border border-solid border-transparent p-4 transition-[opacity,_transform] duration-200 ease-linear peer-focus:-translate-y-2 peer-focus:translate-x-[0.15rem] peer-focus:scale-[0.85] peer-[:not(:placeholder-shown)]:-translate-y-2 peer-[:not(:placeholder-shown)]:translate-x-[0.15rem] peer-[:not(:placeholder-shown)]:scale-[0.85]">
                            ZIP Code
                        </label>
                    </div>
                </div>
            </div>
        </form>
    </section>
</section>
