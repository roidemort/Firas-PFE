<div class="set-password-wrapper">
  <div class="set-password-card">
    <div class="card-header">
      <div class="logo-icon">🔒</div>
      <h1>Définir votre mot de passe</h1>
      <p class="subtitle">Créez un mot de passe sécurisé pour activer votre compte</p>
    </div>

    <div class="email-display">
      <label>Adresse email</label>
      <div class="email-value">{{ email }}</div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="newPassword">Nouveau mot de passe</label>
        <input
          id="newPassword"
          type="password"
          formControlName="newPassword"
          placeholder="Entrez votre mot de passe"
          class="form-input"
        />
        <span class="field-error" *ngIf="form.get('newPassword')!.touched && form.get('newPassword')!.hasError('minlength')">
          Le mot de passe doit contenir au moins 6 caractères.
        </span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Confirmez votre mot de passe"
          class="form-input"
        />
        <span class="field-error" *ngIf="passwordMismatch">
          Les mots de passe ne correspondent pas.
        </span>
      </div>

      <button
        type="submit"
        class="submit-btn"
        [disabled]="form.invalid || loading"
      >
        <span *ngIf="!loading">Activer mon compte</span>
        <span *ngIf="loading">Chargement...</span>
      </button>
    </form>

    <div class="message success" *ngIf="successMessage">
      ✅ {{ successMessage }}
    </div>
    <div class="message error" *ngIf="errorMessage">
      ❌ {{ errorMessage }}
    </div>
  </div>
</div>
