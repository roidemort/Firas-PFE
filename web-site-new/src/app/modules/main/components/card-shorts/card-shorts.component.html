<div  class="relative w-full px-4 pb-12 md:pb-12">
  <ng-container *ngIf="cards.length > 0 else noCapsules">

  <div class="w-full overflow-hidden">
    <div class="flex flex-col md:flex-row transition-transform duration-300"
      [ngStyle]="{'transform': 'translateX(-' + (currentIndex * (100 / cardsToShow)) + '%)'}">
      <div *ngFor="let card of cards; let i = index" class="w-full md:w-1/4 min-w-[calc(100%/4)] py-2 px-1"
        [ngClass]="{'pr-1': i < cardsToShow - 1}">
        <div class="">

          <div class="custom-bg-card h-[40rem] bg-[#DCECEC] rounded-t-3xl">
            <iframe [src]="card.url | safeUrl" frameborder="0" allowfullscreen
              class="w-full h-full rounded-t-3xl"></iframe>
          </div>

          <!-- <div class="flex items-center">
            <img [src]="card.provider?.logo?.secure_url" alt="Logo" class="max-w-full h-7" />
          </div> -->

          <div class="flex flex-col justify-start bg-[#EDF6F6] p-4 rounded-b-3xl min-h-32 text-wrap">
            <p class="text-xs 2xl:text-sm font-semibold text-[#476F77]">{{ truncateText(card.category.name, 60) }}</p>
            <h2 class="text-sm 2xl:text-lg font-semibold text-[#19272A]">{{ truncateText(card.title, 60) }}</h2>            
          </div>
        </div>
      </div>
    </div>
  </div>


  <div *ngIf="cards.length > 4">
    <button *ngIf="style" (mouseover)="isHoveringPrev = true" (mouseleave)="isHoveringPrev = false"
            (click)="prevCard()"
            class="h-[93%] hidden md:block absolute left-[19px] rounded-tl-3xl rounded-bl-3xl w-1/12 top-2 bg-transparent border-none "
            [ngClass]="{'custom-bg' : prevStatus}"
            [disabled]="currentIndex === 0">
            <svg class="ml-4" width="40" height="40" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.5 23.3334L8.16667 14.0001L17.5 4.66675"
                    [attr.stroke]="isHoveringPrev && currentIndex > 0 ? '#ffffff' : '#A4CECE'" stroke-width="1.75"
                    stroke-linecap="round" stroke-linejoin="round" class="transition-colors duration-300" />
            </svg>
        </button>
        <button *ngIf="style && nextStatus" (mouseover)="isHoveringNext = true" (mouseleave)="isHoveringNext = false"
            (click)="nextCard()"
            class="h-[93%] hidden md:block absolute right-[19px] rounded-tl-3xl rounded-bl-3xl w-1/12 top-2 bg-transparent border-none"
            [ngClass]="{'custom-bg-rev' : nextStatus}"
            [disabled]="currentIndex >= cards.length - cardsToShow">
            <svg class="ml-4" width="40" height="40" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.5 23.3334L8.16667 14.0001L17.5 4.66675"
                    [attr.stroke]="isHoveringNext && currentIndex < cards.length - cardsToShow ? '#ffffff' : '#A4CECE'" stroke-width="1.75"
                    stroke-linecap="round" stroke-linejoin="round" class="transition-colors duration-300" />
            </svg>
        </button>
    <!-- <button *ngIf="style" (mouseover)="isHoveringPrev = true" (mouseleave)="isHoveringPrev = false" (click)="prevCard()"
      class="hidden md:block absolute top-1/2 left-0 transform -translate-y-1/2 bg-[#A4CECE] text-white p-4 rounded-full transition-colors duration-300 hover:bg-[#23BAC4] hover:text-white"
      [ngClass]="{'!bg-[#A4CECE]': currentIndex === 0}" [disabled]="currentIndex === 0">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.5 23.3334L8.16667 14.0001L17.5 4.66675"
          [attr.stroke]="isHoveringPrev &&  currentIndex > 0 ? '#EDF6F6' : '#366464'" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round" class="transition-colors duration-300" />
      </svg>
    </button>
    <button *ngIf="style" (mouseover)="isHoveringNext = true" (mouseleave)="isHoveringNext = false" (click)="nextCard()"
      class="hidden md:block absolute top-1/2 right-0 transform -translate-y-1/2 bg-[#A4CECE] text-white p-4 rounded-full transition-colors duration-300 hover:bg-[#23BAC4] hover:text-white"
      [ngClass]="{'!bg-[#A4CECE]': currentIndex >= cards.length - cardsToShow}"
      [disabled]="currentIndex >= cards.length - cardsToShow">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10.5 23.3334L19.8333 14.0001L10.5 4.66675"
          [attr.stroke]="isHoveringNext && currentIndex < cards.length - cardsToShow ? '#EDF6F6' : '#366464'"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" class="transition-colors duration-300" />
      </svg>
    </button> -->
  </div>
</ng-container>
<ng-template #noCapsules>
    <p class="text-secondaryfontColor pl-8 text-xl">Les capsules en cours de préparation seront bientôt disponibles.</p>
</ng-template>
</div>
