<div 
  *ngIf="ad" 
  class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm z-50 transition-opacity duration-300"
>
  <div 
    class="bg-white p-4 rounded-2xl shadow-2xl w-auto relative transform transition-all duration-300 scale-100"
    [ngClass]="{'max-w-4xl w-full': ad.type === 'video'}"
  >
    <!-- Bouton de fermeture -->
    <button 
      (click)="close()" 
      class="absolute -top-7 right-0 text-gray-400 hover:text-gray-600 transition-transform duration-200 transform hover:scale-110"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="white">
        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2" fill="none" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 9L9 15M9 9l6 6" />
      </svg>
      
    </button>

    <!-- Titre de la publicité -->
    <!-- <h2 class="text-2xl font-bold text-gray-800 mb-4 leading-tight">{{ ad.title }}</h2> -->
    
    <!-- Vidéo (si disponible) -->
    <ng-container *ngIf="ad.type === 'video'">
      <app-vimeo-player [id]="ad.details" class="w-full"></app-vimeo-player>
    </ng-container>


    <ng-container *ngIf="ad.type === 'image'">
      <img [src]="ad.image?.secure_url" class="max-w-full max-h-[400px] object-contain w-full" alt="ad">
    </ng-container>

    <!-- Bouton CTA -->
    <!-- <button 
      class="mt-2 w-full border-2 hover:bg-transparent border-secondaryfontColor bg-secondaryfontColor rounded-full text-sm px-6 lg:px-14 py-3 text-[#0D1B2A] transition duration-300"
      (click)="close()"
    >
      Fermer la publicité
    </button> -->
  </div>
</div>
