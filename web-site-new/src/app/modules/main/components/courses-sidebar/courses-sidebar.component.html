<!-- Main Sidebar -->
<nav [ngClass]="menu ? 'w-72 lg:w-80' : 'w-0'"
     class="h-[90vh] hidden lg:flex flex-col bg-gradient-to-b from-[#0b1b29] via-[#0d2335] to-[#0b1b29] border-r border-[#1B9198]/20 shadow-2xl transition-all duration-500 ease-out overflow-hidden">

    <!-- Sidebar Header -->
    <div class="p-6 border-b border-[#1B9198]/20">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-[#1B9198] to-[#0b1b29] rounded-xl flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
            </div>
            <div>
                <h2 class="text-lg font-bold text-white">Apprentissage</h2>
                <p class="text-sm text-[#B0EDF1]/70">Explorez nos contenus</p>
            </div>
        </div>
    </div>

    <!-- Sidebar Content -->
    <div class="flex-1 overflow-y-auto py-6 px-4 custom-scrollbar">
        <div class="space-y-6">

            <!-- Search Bar -->
            <div class="px-2">
                <div class="relative group">
                    <input type="text"
                           placeholder="Rechercher une formation..."
                           class="w-full px-4 pl-12 py-3 bg-white/5 backdrop-blur-sm border border-[#1B9198]/30 rounded-2xl text-white placeholder:text-[#B0EDF1]/50 focus:outline-none focus:ring-2 focus:ring-[#1B9198]/50 focus:border-transparent transition-all duration-300">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#B0EDF1]/50 group-focus-within:text-[#1B9198]"
                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>

            <!-- Navigation Menu -->
            <div class="space-y-1">
                <!-- Home -->
                <div class="group cursor-pointer" (click)="resetFilters()">
                    <div class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 hover:bg-white/5 hover:pl-6">
                        <div class="w-8 h-8 flex items-center justify-center bg-gradient-to-br from-[#1B9198]/20 to-transparent rounded-lg group-hover:from-[#1B9198]/40 transition-all duration-300">
                            <svg-icon src="assets/images/Home.svg" [svgClass]="'w-5 h-5 text-[#B0EDF1]'"></svg-icon>
                        </div>
                        <span class="text-white font-medium group-hover:text-[#B0EDF1] transition-colors duration-300">Accueil</span>
                    </div>
                </div>

                <!-- Formations -->
                <div class="group cursor-pointer" (click)="toggleCategories()">
                    <div class="flex items-center justify-between px-4 py-3 rounded-xl transition-all duration-300 hover:bg-white/5 hover:pl-6">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 flex items-center justify-center bg-gradient-to-br from-[#1B9198]/20 to-transparent rounded-lg group-hover:from-[#1B9198]/40 transition-all duration-300">
                                <svg-icon src="assets/images/Video_file.svg" [svgClass]="'w-5 h-5 text-[#B0EDF1]'"></svg-icon>
                            </div>
                            <span class="text-white font-medium group-hover:text-[#B0EDF1] transition-colors duration-300">Nos formations</span>
                        </div>
                        <svg class="w-4 h-4 text-[#B0EDF1]/50 transition-transform duration-300"
                             [ngClass]="{'rotate-180': showCategories}"
                             fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                </div>

                <!-- Categories Dropdown -->
                <div *ngIf="showCategories" class="ml-4 pl-6 border-l border-[#1B9198]/30 space-y-2 animate-slide-down">
                    <ng-container *ngFor="let category of categories; let i = index">
                        <div class="group/cat cursor-pointer relative">
                            <!-- Main Category -->
                            <div class="flex items-center justify-between px-3 py-2 rounded-lg transition-all duration-300 hover:bg-white/5"
                                 (click)="onCategorieSelected(category)">
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 bg-gradient-to-r from-[#1B9198] to-[#0b1b29] rounded-full"></div>
                                    <span class="text-sm text-[#B0EDF1]/80 group-hover/cat:text-white transition-colors">
                                        {{ category.name }}
                                    </span>
                                </div>
                                <svg *ngIf="category.providers.length > 0"
                                     class="w-3 h-3 text-[#B0EDF1]/50 transition-transform duration-300"
                                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </div>

                            <!-- Subcategories (Providers) -->
                            <div *ngIf="category.providers.length > 0" class="ml-4 pl-4 border-l border-dashed border-[#1B9198]/20 space-y-1 mt-1">
                                <ng-container *ngFor="let provider of category.providers; let j = index">
                                    <ng-container *ngIf="j === 0 || provider.name !== category.providers[j - 1]?.name">
                                        <div class="flex items-center px-2 py-1.5 rounded transition-all duration-300 hover:bg-white/5 group/sub"
                                             (click)="onProviderSelected(provider, category, $event)">
                                            <div class="w-1.5 h-1.5 bg-[#1B9198]/50 rounded-full mr-2 group-hover/sub:bg-[#1B9198] transition-colors"></div>
                                            <span class="text-xs text-[#B0EDF1]/60 group-hover/sub:text-white transition-colors">
                                                {{ provider.name }}
                                            </span>
                                        </div>
                                    </ng-container>
                                </ng-container>
                            </div>
                        </div>
                    </ng-container>
                </div>

                <!-- Capsules -->
                <div class="group cursor-pointer" (click)="toggleProviders()">
                    <div class="flex items-center justify-between px-4 py-3 rounded-xl transition-all duration-300 hover:bg-white/5 hover:pl-6">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 flex items-center justify-center bg-gradient-to-br from-[#1B9198]/20 to-transparent rounded-lg group-hover:from-[#1B9198]/40 transition-all duration-300">
                                <svg-icon src="assets/images/pil.svg" [svgClass]="'w-5 h-5 text-[#B0EDF1]'"></svg-icon>
                            </div>
                            <span class="text-white font-medium group-hover:text-[#B0EDF1] transition-colors duration-300">Capsules</span>
                        </div>
                        <svg class="w-4 h-4 text-[#B0EDF1]/50 transition-transform duration-300"
                             [ngClass]="{'rotate-180': showProviders}"
                             fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                </div>

                <!-- Capsules Dropdown -->
                <div *ngIf="showProviders" class="ml-4 pl-6 border-l border-[#1B9198]/30 space-y-2 animate-slide-down">
                    <ng-container *ngFor="let capsule of capsules">
                        <div class="group/caps cursor-pointer relative">
                            <!-- Main Capsule Category -->
                            <div class="flex items-center justify-between px-3 py-2 rounded-lg transition-all duration-300 hover:bg-white/5"
                                 (click)="onCategorieCapsulesSelected(capsule)">
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 bg-gradient-to-r from-[#1B9198] to-[#0b1b29] rounded-full"></div>
                                    <span class="text-sm text-[#B0EDF1]/80 group-hover/caps:text-white transition-colors">
                                        {{ capsule.name }}
                                    </span>
                                </div>
                                <svg *ngIf="capsule.providers.length > 0"
                                     class="w-3 h-3 text-[#B0EDF1]/50 transition-transform duration-300"
                                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </div>

                            <!-- Subcategories (Providers) -->
                            <div *ngIf="capsule.providers.length > 0" class="ml-4 pl-4 border-l border-dashed border-[#1B9198]/20 space-y-1 mt-1">
                                <ng-container *ngFor="let provider of capsule.providers; let j = index">
                                    <ng-container *ngIf="j === 0 || provider.name !== capsule.providers[j - 1]?.name">
                                        <div class="flex items-center px-2 py-1.5 rounded transition-all duration-300 hover:bg-white/5 group/sub"
                                             (click)="onProviderCapsulesSelected(provider, capsule, $event)">
                                            <div class="w-1.5 h-1.5 bg-[#1B9198]/50 rounded-full mr-2 group-hover/sub:bg-[#1B9198] transition-colors"></div>
                                            <span class="text-xs text-[#B0EDF1]/60 group-hover/sub:text-white transition-colors">
                                                {{ provider.name }}
                                            </span>
                                        </div>
                                    </ng-container>
                                </ng-container>
                            </div>
                        </div>
                    </ng-container>
                </div>

                <!-- Coming Soon -->
                <div class="group cursor-not-allowed">
                    <div class="flex items-center gap-3 px-4 py-3 rounded-xl opacity-60">
                        <div class="w-8 h-8 flex items-center justify-center bg-gradient-to-br from-[#1B9198]/10 to-transparent rounded-lg">
                            <svg-icon src="assets/images/Date_today.svg" [svgClass]="'w-5 h-5 text-[#B0EDF1]/50'"></svg-icon>
                        </div>
                        <span class="text-white/50 font-medium">Vidéos à venir</span>
                    </div>
                </div>
            </div>

            <!-- Active Filters -->
            <div *ngIf="selectedCategories.length > 0 || selectedProviderIds.length > 0"
                 class="mt-8 p-4 bg-white/5 backdrop-blur-sm rounded-2xl border border-[#1B9198]/20">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm font-medium text-white">Filtres actifs</span>
                    <button (click)="resetFilters()"
                            class="text-xs text-[#1B9198] hover:text-[#B0EDF1] transition-colors">
                        Tout effacer
                    </button>
                </div>
                <div class="flex flex-wrap gap-2">
                    <div *ngFor="let cat of selectedCategories"
                         class="px-2 py-1 bg-gradient-to-r from-[#1B9198]/20 to-[#0b1b29]/20 text-[#B0EDF1] text-xs rounded-lg border border-[#1B9198]/30">
                        {{ cat }}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar Footer -->
    <div class="p-4 border-t border-[#1B9198]/20">
        <div class="px-4 py-3 bg-gradient-to-r from-[#1B9198]/10 to-transparent rounded-xl">
            <p class="text-xs text-[#B0EDF1]/60">© 2024 Plateforme d'apprentissage</p>
            <p class="text-xs text-[#B0EDF1]/40 mt-1">Tous droits réservés</p>
        </div>
    </div>
</nav>

<!-- Mobile Sidebar -->
<div *ngIf="mobileMenu"
     class="fixed inset-0 z-50 lg:hidden">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" (click)="toggleMobileMenu()"></div>

    <!-- Sidebar Panel -->
    <div class="absolute left-0 top-0 h-full w-80 bg-gradient-to-b from-[#0b1b29] via-[#0d2335] to-[#0b1b29] shadow-2xl transform transition-transform duration-500 ease-out overflow-hidden">
        <!-- Mobile header -->
        <div class="p-6 border-b border-[#1B9198]/20">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-[#1B9198] to-[#0b1b29] rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                    </div>
                    <h2 class="text-lg font-bold text-white">Navigation</h2>
                </div>
                <button (click)="toggleMobileMenu()"
                        class="p-2 text-[#B0EDF1] hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile content (same as desktop but with close functionality) -->

    </div>
</div>
