<div
  class="overflow-x-hidden overflow-y-auto fixed inset-0 z-50 outline-none focus:outline-none justify-center items-center flex backdrop-blur">
  <div class="relative w-auto my-6 mx-auto max-w-6xl overflow-y-scroll max-h-screen">
    <!--content-->
    <div
      class="border-0 rounded-lg shadow-lg relative flex flex-col min-w-[600px] bg-card outline-none focus:outline-none">
      <!--header-->
      <div class="flex items-start p-5 pl-0 border-b border-solid border-blueGray-200 rounded-t my-4">
        <div class="absolute top-[10px] right-[10px] ">
          <button (click)="onCloseActions()"
                  class="flex h-7 w-7 items-center text-red-600 justify-center rounded-md text-2xl hover:bg-card hover:text-red-800">
            <svg-icon src="./assets/icons/heroicons/outline/x-mark.svg" [svgClass]="'h-8 w-8'"></svg-icon>
          </button>
        </div>
        <span class="text-3xl w-1 h-[30px] mr-3 bg-primaryColor"></span>
        <h5 class="text-xl font-semibold text-foreground">
          Gestion des médias
        </h5>
      </div>
      <!--body-->
      <div class="relative px-12">
        <div class="mx-auto px-4 py-4 sm:px-8">
          <label for="dropzone-file" class="mx-auto cursor-pointer flex w-full flex-col items-center rounded-xl border-2 border-dashed border-primary p-12 text-center" appDrag (files)="filesDropped($event)">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <h2 class="mt-4 text-xl font-medium text-gray-700 tracking-wide"></h2>
            <p class="mt-2 text-gray-500 tracking-wide">Déposez les fichiers ici ou cliquez pour télécharger</p>
            <input id="dropzone-file" type="file" class="hidden" multiple="true" (change)="onImageSelected($event)"/>
          </label>
        </div>
        <div class="mx-auto mt-5 px-4 py-4 sm:px-8">
          <div class="mb-4 flex justify-between">
            <div class="inline-block">
              <h3 class="font-semibold text-foreground">Liste de toutes les images</h3>
              <div class="space-x-1 text-xs font-medium text-muted-foreground">
                <a href="" class="hover:text-primary">Tous les images:</a>
                <span class="text-foreground">{{allMediaCount}}</span>
              </div>
            </div>
          </div>
          <div class="flex min-w-full flex-col rounded-xl border border-muted/20 bg-background p-2">
            <app-table-image-action class="mb-10" (changeText)="onChangeText($event)"></app-table-image-action>
            <div class="overflow-x-auto">
              <table
                class="table w-full table-auto border-collapse border-0 text-left align-middle leading-5 text-muted-foreground">
                <thead class="border border-muted/20 text-xs text-muted-foreground">
                  <tr app-table-image-header selectedType="{{selectedType}}" class="h-20" (onSort)="sortKeys($event)" (onCheck)="toggleImages($event)"></tr>
                </thead>
                <tbody>
                  @for (image of allMedia(); track $index) {
                    <tr class="hover:bg-card/50" app-table-image-row (onCheck)="toggleImage($event)" [image]="image"></tr>
                  } @empty {
                    <tr>
                      <td class="py-4 text-center text-sm" colspan="7">Aucun image trouvé</td>
                    </tr>
                  }
                </tbody>
              </table>
            </div>
            <app-table-image-footer class="mt-10" (changeItemsPerPage)="onChangeItemsPerPage($event)"
                                    [currentPage]="currentPage"
                                    [itemsPerPage]="itemsPerPage"
                                    [totalItems]="allMediaCount"
                                    (pageChanged)="onPageChange($event)"></app-table-image-footer>
          </div>
        </div>
      </div>
      <!--footer-->
      <div class="flex items-center justify-end p-6 border-t border-solid border-muted rounded-b space-x-2">
        <button (click)="onCloseActions()" class="font-semibold focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 bg-transparent text-primary hover:bg-primary/10 focus-visible:ring-primary p-2 px-4 rounded-lg" type="button">
          Annuler</button>
        <button (click)="onSelectMedia()" [disabled]="isLoading"
                class="bg-primary text-white p-2 rounded-md border-b-[3px] border-primary-dark flex items-center"
                type="button">
          <svg *ngIf="isLoading" class="-ml-1 mr-3 h-5 w-5 animate-spin text-white" xmlns="http://www.w3.org/2000/svg"
               fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          Confirmer
        </button>
      </div>
    </div>
  </div>
</div>
