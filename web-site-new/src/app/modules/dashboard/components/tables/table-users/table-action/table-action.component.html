<div class="flex flex-wrap items-center justify-between gap-2 py-3">
  <div class="flex flex-wrap gap-6">
    <div class="flex">
      <label class="relative text-muted-foreground">
        <div class="absolute left-2.5 top-3.5">
          <svg-icon src="./assets/icons/heroicons/outline/magnifying-glass.svg" [svgClass]="'h-4 w-4'"> </svg-icon>
        </div>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <input class="pl-8 pr-2 w-[300px]" placeholder="Rechercher..." type="text" value="" formControlName="text"/>
        </form>
      </label>
    </div>
    <div class="flex flex-wrap gap-2.5">
      <select class="w-40 text-muted-foreground" (change)="onChangeRole($event)">
        <option disabled selected>-- Rôle --</option>
        <option value="">Tous</option>
        <option value="PHARMACIST_HOLDER">Pharmacien Titulair</option>
        <option value="PHARMACIST">Pharmacien</option>
        <option value="PREPARER">Préparateur en pharmacie</option>
        <option value="STUDENT">Parapharmacie</option>
      </select>
      <select class="w-40 text-muted-foreground" (change)="onChangeStatus($event)">
        <option disabled selected>-- Statut --</option>
        <option value="">Tous</option>
        <option value="3">Inactif</option>
        <option value="1">Actif</option>
      </select>
      <select class="w-40 text-muted-foreground" (change)="onChangeGender($event)">
        <option disabled selected>-- Gender --</option>
        <option value="">Tous</option>
        <option value="Male">Homme</option>
        <option value="Female">Femme</option>
      </select>
    </div>
  </div>
</div>
