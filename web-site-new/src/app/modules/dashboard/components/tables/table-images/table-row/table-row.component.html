<ng-container #actions>
  <td class="text-center">
    <input
      (change)="toggle($event)"
      [(ngModel)]="image.selected"
      class="checkbox checkbox-sm"
      data-datatable-row-check="true"
      type="checkbox"
      value="28" />
  </td>
  <td >
    <figure>
      <img class="w-20" src="{{image.secure_url}}" alt="">
    </figure>
  </td>
  <td >{{ image.filename }}</td>
  <td >{{ image.size | convertSizeToString }}</td>
  <td >{{image.width}} * {{image.height}}</td>
  <td>{{ image.createdAt | date:"dd-MM-yyyy" }}</td>
</ng-container>
