<div class="mx-auto px-4 py-4 sm:px-8" #actions>
  <div class="mb-4 flex justify-between">
    <div class="inline-block">
      <h3 class="font-semibold text-foreground">Liste des quiz</h3>
      <div class="space-x-1 text-xs font-medium text-muted-foreground">
        <a href="" class="hover:text-primary">Tous les quiz:</a>
        <span class="text-foreground">{{allQuizCount}}</span>
      </div>
    </div>
  </div>

  <div class="flex min-w-full flex-col rounded-xl border border-muted/20 bg-background p-2">
    <app-loader *ngIf="isLoading"></app-loader>
    <app-table-quiz-action class="mb-10" (changeStatus)="onChangeStatus($event)" (changeText)="onChangeText($event)" (changeCourse)="onChangeCourse($event)" (changeSection)="onChangeSection($event)"></app-table-quiz-action>
    <div class="overflow-x-auto">
      <table
        class="table w-full table-auto border-collapse border-0 text-left align-middle leading-5 text-muted-foreground">
        <thead class="border border-muted/20 text-xs text-muted-foreground">
        <tr app-table-quiz-header class="h-20" (onSort)="sortQuiz($event)"></tr>
        </thead>
        <tbody>
          @for (quiz of quiz(); track $index) {
            <tr class="hover:bg-card/50" app-table-quiz-row (updateQuiz)="manageQuiz('edit', $event)" [quiz]="quiz"></tr>
          } @empty {
            <tr>
              <td class="py-4 text-center text-sm" colspan="7">Aucun quiz trouvé</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
    <app-table-quiz-footer class="mt-10" (changeItemsPerPage)="onChangeItemsPerPage($event)"
                               [currentPage]="currentPage"
                               [itemsPerPage]="itemsPerPage"
                               [totalItems]="allQuizCount"
                               (pageChanged)="onPageChange($event)"></app-table-quiz-footer>
  </div>
</div>
