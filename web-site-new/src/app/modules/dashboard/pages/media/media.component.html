<app-loader *ngIf="isLoading"></app-loader>
<div class="mx-auto px-4 py-4 sm:px-8" #actions>
  <div class="mb-4 flex justify-between">
    <div class="inline-block">
      <h3 class="font-semibold text-foreground">Gestion des médias</h3>
    </div>
  </div>
</div>
<div class="mx-auto px-4 py-4 sm:px-8">
      <label for="dropzone-file" class="mx-auto cursor-pointer flex w-full flex-col items-center rounded-xl border-2 border-dashed border-primary p-12 text-center" appDrag (files)="filesDropped($event)">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <h2 class="mt-4 text-xl font-medium text-gray-700 tracking-wide"></h2>
        <p class="mt-2 text-gray-500 tracking-wide">Déposez les fichiers ici ou cliquez pour télécharger</p>
        <input id="dropzone-file" type="file" accept="image/png, image/gif, image/jpeg" class="hidden" multiple="true" (change)="onImageSelected($event)"/>
      </label>
</div>
<div class="mx-auto mt-5 px-4 py-4 sm:px-8">
  <div class="mb-4 flex justify-between">
    <div class="inline-block">
      <h3 class="font-semibold text-foreground">Liste de toutes les images</h3>
      <div class="space-x-1 text-xs font-medium text-muted-foreground">
        <a href="" class="hover:text-primary">Tous les images:</a>
        <span class="text-foreground">{{allMediaCount}}</span>
      </div>
    </div>
  </div>
  <div class="flex min-w-full flex-col rounded-xl border border-muted/20 bg-background p-2">
    <app-table-image-action class="mb-10" (changeText)="onChangeText($event)"></app-table-image-action>
    <div class="flex items-center justify-start gap-4" *ngIf="selectedMedia.length">
      <span class="ml-2 text-sm font-medium text-muted-foreground">{{ selectedMedia.length }} sélectionné</span>
      <button (click)="onDeleteImages()"
              class="flex h-7 w-7 items-center text-red-600 justify-center rounded-md hover:bg-card hover:text-red-800">
        <svg-icon src="./assets/icons/heroicons/outline/trash.svg" [svgClass]="'h-4 w-4'"> </svg-icon>
      </button>
    </div>
    <div class="overflow-x-auto">
      <table
        class="table w-full table-auto border-collapse border-0 text-left align-middle leading-5 text-muted-foreground">
        <thead class="border border-muted/20 text-xs text-muted-foreground">
        <tr app-table-image-header selectedType="multiple" class="h-20" (onSort)="sortKeys($event)" (onCheck)="toggleImages($event)"></tr>
        </thead>
        <tbody>
          @for (image of allMedia(); track $index) {
            <tr class="hover:bg-card/50" app-table-image-row (onCheck)="toggleImage($event)" [image]="image"></tr>
          } @empty {
            <tr>
              <td class="py-4 text-center text-sm" colspan="7">Aucun image trouvé</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
    <app-table-image-footer class="mt-10" (changeItemsPerPage)="onChangeItemsPerPage($event)"
                      [currentPage]="currentPage"
                      [itemsPerPage]="itemsPerPage"
                      [totalItems]="allMediaCount"
                      (pageChanged)="onPageChange($event)"></app-table-image-footer>
  </div>
</div>
