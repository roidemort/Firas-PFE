<app-loader *ngIf="isLoading"></app-loader>
<div class="mx-auto px-4 py-4 sm:px-8" #actions>
  <div class="mb-4 flex justify-between">
    <div class="inline-block">
      <h3 class="font-semibold text-foreground">Liste des formations</h3>
      <div class="space-x-1 text-xs font-medium text-muted-foreground">
        <a href="" class="hover:text-primary">Tous les formations:</a>
        <span class="text-foreground">{{ allCoursesCount }}</span>
      </div>
    </div>
    <div class="inline-block space-x-4">
      <button  (click)="manageCourse('add')"
              class="flex items-center justify-center bg-primary text-white p-2 rounded-md border-b-[3px] border-primary-dark" type="button">
        <svg-icon src="assets/icons/heroicons/outline/plus.svg" [svgClass]="'h-5 w-5'"> </svg-icon>
        Ajouter une formation</button>
    </div>
  </div>
  <div class="flex min-w-full flex-col rounded-xl border border-muted/20 bg-background p-2">
    <app-loader *ngIf="isLoading"></app-loader>
    <app-table-course-action class="mb-10" (changeStatus)="onChangeStatus($event)" (changeText)="onChangeText($event)" (changePrice)="onChangePrice($event)" (changeCS)="onChangeCS($event)"></app-table-course-action>
    <div class="flex min-w-full flex-wrap">
      @for (course of courses; track course) {
        <div class="p-4 md:w-1/3" >
          <div class="h-full border-2 border-gray-200 border-opacity-60 rounded-lg overflow-hidden">
            <div class="w-full">
              <div class="w-full flex p-2">
                <div class="p-2 ">
                  <img
                    src="{{ course.provider.logo?.secure_url }}" alt="author"
                    class="w-10 h-10 rounded-full overflow-hidden"/>
                </div>
                <div class="pl-2 pt-2 ">
                  <p class="font-bold">By {{ course.provider.name }}</p>
                  <p class="text-xs">{{ course.createdAt | date:'fullDate' }}</p>
                </div>
              </div>
            </div>


            <img class="lg:h-48 md:h-36 w-full object-cover object-center" src="{{ course.preview?.secure_url }}" alt="blog cover"/>

            <div class="p-4">
              <h2 class="tracking-widest text-xs title-font font-bold text-primary mb-1 uppercase ">{{ course.category.name }}</h2>
              <h1 class="title-font text-lg font-medium text-gray-900 mb-3 min-h-16">{{ course.title }}</h1>
              <div class="flex items-center flex-wrap justify-between">
                <div class="my-6 space-x-2 flex flex-row items-center">
                  <label for="status-{{course.id}}" class="space-x-2 flex font-semibold text-base text-gray-600 dark:text-night-100 relative" >Statut
                    <input type="checkbox" id="status-{{course.id}}" class="sr-only peer" (click)="changeStatus($event, course.id, course.status)" [checked]="course.status == 1 || course.status == 0" [disabled]="course.status == 0">
                    <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 " [ngClass]="{'peer-checked:bg-[#21c65f]': course.status === 1 || course.status === 2, 'peer-checked:bg-[#c62121]' : course.status === 0 }"></div>
                  </label>
                </div>
                <div class="my-6 space-x-1 flex flex-row items-center">
                  <button
                    (click)="detailsCourse(course.id)"
                    matTooltip="Statistiques"
                    class="flex h-7 w-7 items-center text-purple-600 justify-center rounded-md hover:bg-card hover:text-purple-800">
                    <svg-icon src="./assets/icons/heroicons/outline/chart-bar.svg" [svgClass]="'h-4 w-4'"> </svg-icon>
                  </button>
                  <button
                    (click)="manageCourse('edit', course.id)"
                    matTooltip="Modifier"
                    class="flex h-7 w-7 items-center text-red-600 justify-center rounded-md hover:bg-card hover:text-red-800">
                    <svg-icon src="./assets/icons/heroicons/outline/pencil-square.svg" [svgClass]="'h-4 w-4'"> </svg-icon>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      }
      @if (!courses || !courses.length) {
        <h2 class="font-semibold text-foreground">Aucune formation trouvé</h2>
      }
    </div>
    <app-table-course-footer class="mt-10" (changeItemsPerPage)="onChangeItemsPerPage($event)"
                               [currentPage]="currentPage"
                               [itemsPerPage]="itemsPerPage"
                               [totalItems]="allCoursesCount"
                               (pageChanged)="onPageChange($event)"></app-table-course-footer>
  </div>
</div>
